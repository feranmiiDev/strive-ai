<style>
        body {
            background-color: #f9f9f9;
            font-family: 'Hanken Grotesk', sans-serif;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(138, 0, 222, 0.1), 
                        10px 10px 20px rgba(166, 53, 251, 0.05);
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(138, 0, 222, 0.4) 0%, rgba(0, 242, 254, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            33% { transform: translateY(-50px) translateX(30px) scale(1.2); }
            66% { transform: translateY(20px) translateX(-40px) scale(0.8); }
        }

        .input-glow:focus {
            outline: none;
            border-color: transparent;
            box-shadow: 0 4px 0 0 #00f1fd;
            background: rgba(255, 255, 255, 0.95);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #8a00de 0%, #a635fb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover {
            box-shadow: 0 0 20px rgba(0, 241, 253, 0.4);
            transform: translateY(-2px);
        }

        .btn-gradient:active {
            transform: scale(0.98);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="min-h-screen flex items-center justify-center relative">
<!-- Atmospheric Particles -->

<div class="particle w-64 h-64 top-10 left-10 opacity-20" style="animation-delay: 0s;"></div>

<div class="particle w-80 h-80 top-1/4 right-1/4 opacity-15" style="animation-delay: -8s;"></div>
</div>
<!-- Main Content -->

<!-- Error Notification -->
<div class="w-full bg-error-container text-on-error-container border border-error/20 rounded-lg p-4 mb-8 flex items-start gap-3 animate-pulse">

<p class="font-label-md text-label-md leading-snug">

<!-- Login Form -->
<form class="w-full flex flex-col gap-6" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">University Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-white/50 border border-white/20 rounded-lg input-glow font-body-md text-body-md text-on-surface transition-all placeholder:text-surface-dim" id="email" placeholder="student@university.edu" type="email"/>
</div>
</div>

<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>

</div>
<div class="relative group">

<input class="w-full pl-12 pr-12 py-3 bg-white/50 border border-white/20 rounded-lg input-glow font-body-md text-body-md text-on-surface transition-all placeholder:text-surface-dim" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>

<!-- Micro-interaction Script -->
<script>
        // Atmospheric Mouse Movement Effect
        document.addEventListener('mousemove', (e) => {
            const container = document.getElementById('particle-container');
            const moveX = (e.clientX / window.innerWidth) * 20;
            const moveY = (e.clientY / window.innerHeight) * 20;
            
            const particles = container.querySelectorAll('.particle');
            particles.forEach((p, i) => {
                const speed = (i + 1) * 0.5;
                p.style.transform = `translate(${moveX * speed}px, ${moveY * speed}px)`;
            });
        });

        // Simple button active state feedback
        const btn = document.querySelector('.btn-gradient');
        btn.addEventListener('click', () => {
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> <span>Processing...</span>';
            setTimeout(() => {
                btn.innerHTML = '<span>Authenticate</span><span class="material-symbols-outlined">bolt</span>';
            }, 2000);
        });
    </script>
